<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Aluno</title>
</head>

<body>
    <form class="row g-3">
        <div class="col-md-6">
            <label for="inputEmail4" class="form-label">Nome Completo</label>
            <input type="email" class="form-control" id="inputEmail4">
        </div>
        <div class="col-md-6">
            <label for="inputPassword4" class="form-label">CPF</label>
            <input type="password" class="form-control" id="inputPassword4">
        </div>
        <div class="col-12">
            <label for="inputAddress" class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" id="inputAddress" placeholder="1234 Main St">
        </div>
        <div class="col-12">
            <label for="inputAddress" class="form-label">Telefone</label>
            <input type="telefone" class="form-control" id="telefone" placeholder="(+47 )">
        </div>
        <div class="col-12">
            <label for="inputAddress2" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="">
        </div>
        <div class="col-md-6">
            <label for="inputCity" class="form-label">Endereço Completo</label>
            <input type="text" class="form-control" id="Estado">

</body>

</html>
